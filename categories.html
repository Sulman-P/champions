<!DOCTYPE html>
<html>
<head>

<title>Exam Categories</title>

<style>

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
padding:30px;
text-align:center;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

</style>

</head>

<body>

<h1 style="text-align:center">Exam Categories</h1>

<div class="grid">

<div class="card">Mathematics</div>

<div class="card">Integrated Science</div>

<div class="card">English</div>

<div class="card">Social Studies</div>

<div class="card">Kiswahili</div>

<div class="card">Creative Arts</div>

</div>

</body>
</html>
