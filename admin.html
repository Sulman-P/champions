<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | VisionPoint</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

header{
background:#0d47a1;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

button{
background:#e53935;
color:white;
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>VisionPoint Admin Dashboard</h1>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total Exams</h3>
<p id="examCount">12</p>
</div>

<div class="card">
<h3>Teachers</h3>
<p>5</p>
</div>

<div class="card">
<h3>Downloads</h3>
<p>230</p>
</div>

</div>

<h2>Uploaded Exams</h2>

<table>

<tr>
<th>Title</th>
<th>Subject</th>
<th>Action</th>
</tr>

<tr>
<td>Grade 7 Math Exam</td>
<td>Mathematics</td>
<td><button onclick="deleteRow(this)">Delete</button></td>
</tr>

<tr>
<td>Science Revision</td>
<td>Integrated Science</td>
<td><button onclick="deleteRow(this)">Delete</button></td>
</tr>

</table>

</div>

<script>

function deleteRow(btn){

let row=btn.parentNode.parentNode
row.remove()

}

</script>

</body>
</html>
