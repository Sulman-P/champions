<!DOCTYPE html>
<html>
<head>

<title>Student Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

<h1>Student Dashboard</h1>

<div class="card">
<h3>My Resources</h3>
<p>Access downloaded exam papers</p>
</div>

<div class="card">
<h3>Recommended Exams</h3>
<p>Grade level practice exams</p>
</div>

<div class="card">
<h3>Performance</h3>
<p>Track your exam progress</p>
</div>

</div>

</body>
</html>
